<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .stats {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 14px 18px;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #f0c040; }
    .input-row input::placeholder { color: #555; }

    .input-row button {
      padding: 14px 20px;
      background: #f0c040;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover { background: #ffd84d; }
    .input-row button:active { transform: scale(0.96); }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .filter-row button {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #2e2e2e;
      background: transparent;
      color: #888;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-row button.active {
      background: #f0c040;
      color: #000;
      border-color: #f0c040;
      font-weight: 600;
    }

    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 12px;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: #3a3a3a; }

    .todo-item.done { opacity: 0.45; }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #3a3a3a;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 0.75rem;
      color: transparent;
    }

    .todo-item.done .check-btn {
      background: #f0c040;
      border-color: #f0c040;
      color: #000;
    }

    .check-btn:hover { border-color: #f0c040; }

    .todo-text {
      flex: 1;
      font-size: 0.97rem;
      line-height: 1.4;
      word-break: break-all;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #555;
    }

    .del-btn {
      background: transparent;
      border: none;
      color: #444;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .del-btn:hover { color: #ff5555; background: #2a1010; }

    .empty {
      text-align: center;
      color: #444;
      padding: 60px 0;
      font-size: 0.9rem;
    }

    .clear-done {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      color: #555;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-done:hover { border-color: #ff5555; color: #ff5555; }
  </style>
</head>
<body>
<div class="container">
  <h1>TODO</h1>
  <p class="stats" id="stats"></p>

  <div class="input-row">
    <input id="newTask" type="text" placeholder="새 할 일 입력..." maxlength="200" />
    <button onclick="addTodo()">+</button>
  </div>

  <div class="filter-row">
    <button class="active" onclick="setFilter('all', this)">전체</button>
    <button onclick="setFilter('active', this)">진행중</button>
    <button onclick="setFilter('done', this)">완료</button>
  </div>

  <div class="todo-list" id="todoList"></div>

  <button class="clear-done" onclick="clearDone()">완료 항목 삭제</button>
</div>

<script>
  let todos = JSON.parse(localStorage.getItem('todos') || '[]');
  let filter = 'all';

  function save() {
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  function render() {
    const list = document.getElementById('todoList');
    const filtered = todos.filter(t =>
      filter === 'all' ? true :
      filter === 'done' ? t.done :
      !t.done
    );

    const total = todos.length;
    const done = todos.filter(t => t.done).length;
    document.getElementById('stats').textContent =
      total === 0 ? '할 일을 추가하세요' : `${done} / ${total} 완료`;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">항목 없음</div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
        <button class="check-btn" onclick="toggle(${t.id})">✓</button>
        <span class="todo-text">${escHtml(t.text)}</span>
        <button class="del-btn" onclick="remove(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTodo() {
    const input = document.getElementById('newTask');
    const text = input.value.trim();
    if (!text) return;
    todos.unshift({ id: Date.now(), text, done: false });
    input.value = '';
    save(); render();
  }

  function toggle(id) {
    todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
    save(); render();
  }

  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-row button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function clearDone() {
    todos = todos.filter(t => !t.done);
    save(); render();
  }

  document.getElementById('newTask').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  render();
</script>
</body>
</html>
