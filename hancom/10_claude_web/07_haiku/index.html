<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>계산기 — 11번가 디자인</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
  />
  <style>
    /* ─── CSS Custom Properties (11STREET Design System) ──────────────────── */
    :root {
      /* Brand */
      --color-brand-gradient: linear-gradient(135deg, #FF5A2E 0%, #FF0038 50%, #FF00EF 100%);
      --color-primary: #FF0038;
      --color-primary-pressed: #CC002D;
      --color-primary-soft: #FFEBEF;

      /* Grayscale (14-step) */
      --color-gray-01: #000000;
      --color-gray-03: #333333;
      --color-gray-04: #666666;
      --color-gray-07: #999999;
      --color-gray-11: #EEEEEE;
      --color-gray-12: #F4F4F4;
      --color-gray-13: #FAFAFA;
      --color-gray-14: #FFFFFF;

      /* Semantic */
      --bg-page: var(--color-gray-13);
      --bg-card: var(--color-gray-14);
      --bg-key-digit: var(--color-gray-14);
      --bg-key-util: var(--color-gray-12);
      --bg-key-op: var(--color-primary-soft);
      --text-op: var(--color-primary);
      --divider: var(--color-gray-11);

      /* Typography */
      --font-family: "Pretendard Variable", Pretendard, Inter, -apple-system,
        "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      --text-headline-0: 52px;
      --text-headline-0-sm: 36px;
      --text-title-bold: 18px;
      --text-subtitle: 16px;
      --text-body: 20px;
      --text-op: 24px;
      --text-caption: 12px;

      /* Spacing (8pt grid) */
      --space-4: 4px;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --space-48: 48px;
      --space-56: 56px;

      /* Border radius */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-pill: 9999px;

      /* Shadow */
      --shadow-tabbar: 0 -1px 4px rgba(0, 0, 0, 0.06);

      /* Motion */
      --ease-standard: cubic-bezier(0.2, 0, 0.2, 1);
      --dur-fast: 120ms;
    }

    /* ─── Reset ────────────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    html {
      font-family: var(--font-family);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg-page);
      color: var(--color-gray-03);
      overflow: hidden;
    }

    /* ─── Layout Shell ─────────────────────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 390px;
      margin: 0 auto;
      position: relative;
    }

    /* ─── Header (GNB-lite) ────────────────────────────────────────────────── */
    .gnb {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-16);
      border-bottom: 1px solid var(--divider);
      background-color: var(--bg-card);
    }

    .gnb__title {
      font-size: var(--text-title-bold);
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .gnb__reset {
      font-size: var(--text-body);
      font-weight: 500;
      padding: var(--space-6) var(--space-12);
      border: 1px solid var(--divider);
      border-radius: var(--radius-pill);
      background-color: var(--bg-page);
      color: var(--color-gray-03);
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-standard);
    }

    .gnb__reset:active {
      transform: scale(0.96);
      background-color: var(--divider);
    }

    /* ─── Display Card ─────────────────────────────────────────────────────── */
    .display {
      flex-shrink: 0;
      border: 1px solid var(--divider);
      border-radius: var(--radius-md);
      background-color: var(--bg-card);
      padding: var(--space-20);
      margin: var(--space-16);
      text-align: right;
      line-height: 1.4;
    }

    .display__expression {
      font-size: var(--text-caption);
      color: var(--color-gray-04);
      min-height: 18px;
      margin-bottom: var(--space-8);
    }

    .display__result {
      font-size: var(--text-headline-0);
      font-weight: 700;
      color: var(--color-gray-01);
      word-break: break-all;
      font-feature-settings: "tnum";
      letter-spacing: -0.02em;
    }

    .display__result.is-long {
      font-size: var(--text-headline-0-sm);
    }

    .display__error {
      font-size: var(--text-subtitle);
      color: var(--color-primary);
      font-weight: 500;
    }

    /* ─── Keypad Container ─────────────────────────────────────────────────── */
    .keypad-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-16) var(--space-16)
        calc(var(--space-56) + env(safe-area-inset-bottom) + var(--space-16));
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-8);
      grid-auto-rows: 68px;
    }

    /* ─── Key Base Styles ──────────────────────────────────────────────────── */
    .key {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-body);
      font-weight: 500;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-standard);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .key:active {
      transform: scale(0.96);
    }

    /* ─── Digit Keys (0–9) ─────────────────────────────────────────────────── */
    .key--digit {
      background-color: var(--bg-key-digit);
      color: var(--color-gray-03);
      border: 1px solid var(--divider);
    }

    /* ─── Utility Keys (AC, ±, %) ─────────────────────────────────────────── */
    .key--util {
      background-color: var(--bg-key-util);
      color: var(--color-gray-03);
    }

    /* ─── Operator Keys (+, −, ×, ÷) ──────────────────────────────────────── */
    .key--op {
      background-color: var(--bg-key-op);
      color: var(--text-op);
      font-size: var(--text-op);
      font-weight: 700;
    }

    .key--op.is-active {
      background-color: var(--color-primary);
      color: var(--bg-card);
    }

    /* ─── Wide Key (0) ─────────────────────────────────────────────────────── */
    .key--wide {
      grid-column: span 2;
    }

    /* ─── Footer Attribution ───────────────────────────────────────────────── */
    .footer {
      font-size: 11px;
      color: var(--color-gray-07);
      text-align: center;
      padding: var(--space-12) var(--space-16) 0;
      margin-top: var(--space-8);
    }

    /* ─── Fixed = Button (Speciality Button) ───────────────────────────────── */
    .btn-equals {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: calc(var(--space-56) + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--color-brand-gradient);
      color: var(--bg-card);
      font-size: var(--text-title-bold);
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow-tabbar);
      transition: all var(--dur-fast) var(--ease-standard);
      z-index: 100;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-equals::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0);
      transition: background-color var(--dur-fast) var(--ease-standard);
      pointer-events: none;
    }

    .btn-equals:active::after {
      background-color: rgba(0, 0, 0, 0.08);
    }

    /* ─── Reduced Motion ───────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ─── Small Phone Adjustments ──────────────────────────────────────────── */
    @media (max-width: 380px) {
      :root {
        --text-headline-0: 44px;
        --text-headline-0-sm: 32px;
        --text-body: 18px;
      }

      .keypad {
        grid-auto-rows: 60px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="gnb">
      <h1 class="gnb__title">계산기</h1>
      <button type="button" class="gnb__reset" id="btn-reset" aria-label="초기화">
        초기화
      </button>
    </header>

    <section class="display" aria-live="polite" aria-atomic="true">
      <div class="display__expression" id="expression"></div>
      <div class="display__result" id="result">0</div>
    </section>

    <div class="keypad-wrapper">
      <div class="keypad" id="keypad">
        <button class="key key--util" data-action="clear">AC</button>
        <button class="key key--util" data-action="negate">±</button>
        <button class="key key--util" data-action="percent">%</button>
        <button class="key key--op" data-op="divide">÷</button>

        <button class="key key--digit" data-digit="7">7</button>
        <button class="key key--digit" data-digit="8">8</button>
        <button class="key key--digit" data-digit="9">9</button>
        <button class="key key--op" data-op="multiply">×</button>

        <button class="key key--digit" data-digit="4">4</button>
        <button class="key key--digit" data-digit="5">5</button>
        <button class="key key--digit" data-digit="6">6</button>
        <button class="key key--op" data-op="subtract">−</button>

        <button class="key key--digit" data-digit="1">1</button>
        <button class="key key--digit" data-digit="2">2</button>
        <button class="key key--digit" data-digit="3">3</button>
        <button class="key key--op" data-op="add">+</button>

        <button class="key key--digit key--wide" data-digit="0">0</button>
        <button class="key key--digit" data-action="decimal">.</button>
      </div>
      <p class="footer">
        시각 언어는 11번가 디자인 시스템을 참조합니다.
      </p>
    </div>
  </main>

  <button type="button" class="btn-equals" id="btn-equals" aria-label="계산하기">
    =
  </button>

  <script>
    (() => {
      const state = {
        current: "0",
        previous: null,
        operator: null,
        waiting: false,
        error: false,
      };

      const elements = {
        result: document.getElementById("result"),
        expression: document.getElementById("expression"),
        keypad: document.getElementById("keypad"),
        btnEquals: document.getElementById("btn-equals"),
        btnReset: document.getElementById("btn-reset"),
      };

      const displayResult = (value) => {
        if (state.error) {
          elements.result.textContent = "계산할 수 없어요";
          elements.result.classList.add("display__error");
          return;
        }

        elements.result.classList.remove("display__error");
        const formatted = format(value);
        elements.result.textContent = formatted;
        elements.result.classList.toggle("is-long", formatted.length > 10);
      };

      const format = (numStr) => {
        const num = parseFloat(numStr);

        if (!isFinite(num)) return "0";
        if (Math.abs(num) >= 1e10) {
          return num.toExponential(2).replace(/\.?0+e/, "e");
        }

        const parts = numStr.split(".");
        const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts[1] ? `${intPart}.${parts[1]}` : intPart;
      };

      const setError = () => {
        state.error = true;
        displayResult("");
      };

      const compute = (a, b, op) => {
        const x = parseFloat(a);
        const y = parseFloat(b);

        if (op === "add") return x + y;
        if (op === "subtract") return x - y;
        if (op === "multiply") return x * y;
        if (op === "divide") return y === 0 ? null : x / y;
        return y;
      };

      const inputDigit = (digit) => {
        if (state.error) clearAll();
        if (state.waiting) {
          state.current = digit;
          state.waiting = false;
        } else {
          state.current = state.current === "0" ? digit : state.current + digit;
        }
        render();
      };

      const inputDecimal = () => {
        if (state.error) clearAll();
        if (state.waiting) {
          state.current = "0.";
          state.waiting = false;
        } else if (!state.current.includes(".")) {
          state.current += ".";
        }
        render();
      };

      const negate = () => {
        if (state.error) clearAll();
        const num = parseFloat(state.current);
        state.current = String(-num);
        render();
      };

      const percent = () => {
        if (state.error) clearAll();
        let num = parseFloat(state.current);
        if (state.previous !== null && state.operator) {
          num = (parseFloat(state.previous) * num) / 100;
        } else {
          num = num / 100;
        }
        state.current = String(num);
        render();
      };

      const chooseOperator = (op) => {
        if (state.error) return;
        if (state.waiting) {
          state.operator = op;
        } else {
          if (state.previous !== null && state.operator) {
            const result = compute(state.previous, state.current, state.operator);
            if (result === null) {
              setError();
              return;
            }
            state.current = String(result);
          }
          state.previous = state.current;
          state.operator = op;
          state.waiting = true;
        }
        render();
      };

      const equals = () => {
        if (state.error) return;
        if (state.previous === null || state.operator === null) return;

        const result = compute(state.previous, state.current, state.operator);
        if (result === null) {
          setError();
          return;
        }

        state.current = String(result);
        state.previous = null;
        state.operator = null;
        state.waiting = false;
        render();
      };

      const clearAll = () => {
        state.current = "0";
        state.previous = null;
        state.operator = null;
        state.waiting = false;
        state.error = false;
        render();
      };

      const updateOpHighlight = () => {
        document.querySelectorAll(".key--op").forEach((btn) => {
          btn.classList.remove("is-active");
          if (state.waiting && btn.dataset.op === state.operator) {
            btn.classList.add("is-active");
          }
        });
      };

      const render = () => {
        displayResult(state.current);

        let exprText = "";
        if (state.previous !== null && state.operator) {
          exprText = `${format(state.previous)} ${getOpSymbol(state.operator)}`;
        }
        elements.expression.textContent = exprText;

        updateOpHighlight();
      };

      const getOpSymbol = (op) => {
        const symbols = { add: "+", subtract: "−", multiply: "×", divide: "÷" };
        return symbols[op] || "";
      };

      // Event Listeners
      elements.keypad.addEventListener("click", (e) => {
        const btn = e.target.closest(".key");
        if (!btn) return;

        if (btn.dataset.digit !== undefined) {
          inputDigit(btn.dataset.digit);
        } else if (btn.dataset.action === "clear") {
          clearAll();
        } else if (btn.dataset.action === "decimal") {
          inputDecimal();
        } else if (btn.dataset.action === "negate") {
          negate();
        } else if (btn.dataset.action === "percent") {
          percent();
        } else if (btn.dataset.op) {
          chooseOperator(btn.dataset.op);
        }
      });

      elements.btnEquals.addEventListener("click", equals);
      elements.btnReset.addEventListener("click", clearAll);

      // Keyboard Support
      document.addEventListener("keydown", (e) => {
        if (e.key >= "0" && e.key <= "9") inputDigit(e.key);
        if (e.key === ".") inputDecimal();
        if (e.key === "+") {
          e.preventDefault();
          chooseOperator("add");
        }
        if (e.key === "-") {
          e.preventDefault();
          chooseOperator("subtract");
        }
        if (e.key === "*") {
          e.preventDefault();
          chooseOperator("multiply");
        }
        if (e.key === "/") {
          e.preventDefault();
          chooseOperator("divide");
        }
        if (e.key === "Enter" || e.key === "=") {
          e.preventDefault();
          equals();
        }
        if (e.key === "Escape") clearAll();
        if (e.key === "%") {
          e.preventDefault();
          percent();
        }
        if (e.key === "Backspace") {
          e.preventDefault();
          if (!state.error && !state.waiting) {
            if (state.current.length > 1) {
              state.current = state.current.slice(0, -1);
            } else {
              state.current = "0";
            }
            render();
          }
        }
      });

      // Initial render
      render();
    })();
  </script>
</body>

</html>
