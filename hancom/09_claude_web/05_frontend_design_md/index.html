<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기 — Claude Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- top-nav: 크림 바, 스파이크 마크 + 워드마크 -->
  <header class="top-nav">
    <a class="wordmark" href="#" aria-label="Claude 홈">
      <svg class="spike-mark" width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <path d="M10 0 L11.4 8.6 L20 10 L11.4 11.4 L10 20 L8.6 11.4 L0 10 L8.6 8.6 Z" fill="currentColor"/>
      </svg>
      <span>Claude</span>
    </a>
    <nav class="nav-links" aria-label="주 메뉴">
      <a href="#">Product</a>
      <a href="#">Research</a>
      <a href="#">Pricing</a>
    </nav>
  </header>

  <main class="container">
    <!-- 에디토리얼 헤더 -->
    <section class="hero">
      <span class="badge-pill">Design System Demo</span>
      <h1>계산기</h1>
      <p class="hero-sub">크림 캔버스와 코랄 액센트, 다크 navy 표면으로 짠 기본 산술 계산기. 마우스와 키보드 모두 사용할 수 있어요.</p>
    </section>

    <!-- 계산기 카드 (product-mockup-card-dark) -->
    <section class="calc-card" role="application" aria-label="계산기">
      <div class="calc-display">
        <div class="display-previous" id="previous" aria-hidden="true"></div>
        <div class="display-current" id="current" aria-live="polite" aria-atomic="true">0</div>
      </div>

      <div class="calc-keys">
        <button class="key key-util" data-action="clear" aria-label="전체 지우기">AC</button>
        <button class="key key-util" data-action="negate" aria-label="부호 반전">±</button>
        <button class="key key-util" data-action="percent" aria-label="퍼센트">%</button>
        <button class="key key-op" data-op="÷" aria-label="나누기">÷</button>

        <button class="key key-num" data-num="7">7</button>
        <button class="key key-num" data-num="8">8</button>
        <button class="key key-num" data-num="9">9</button>
        <button class="key key-op" data-op="×" aria-label="곱하기">×</button>

        <button class="key key-num" data-num="4">4</button>
        <button class="key key-num" data-num="5">5</button>
        <button class="key key-num" data-num="6">6</button>
        <button class="key key-op" data-op="−" aria-label="빼기">−</button>

        <button class="key key-num" data-num="1">1</button>
        <button class="key key-num" data-num="2">2</button>
        <button class="key key-num" data-num="3">3</button>
        <button class="key key-op" data-op="+" aria-label="더하기">+</button>

        <button class="key key-num key-zero" data-num="0">0</button>
        <button class="key key-num" data-action="decimal" aria-label="소수점">.</button>
        <button class="key key-equals" data-action="equals" aria-label="계산">=</button>
      </div>
    </section>

    <p class="calc-note">키보드: 숫자 · <kbd>+ − * /</kbd> · <kbd>Enter</kbd> 계산 · <kbd>Esc</kbd> 전체지우기 · <kbd>⌫</kbd> 한 글자 지우기</p>
  </main>

  <!-- 다크 navy 푸터 -->
  <footer class="site-footer">
    <div class="footer-brand">
      <svg class="spike-mark" width="18" height="18" viewBox="0 0 20 20" aria-hidden="true">
        <path d="M10 0 L11.4 8.6 L20 10 L11.4 11.4 L10 20 L8.6 11.4 L0 10 L8.6 8.6 Z" fill="currentColor"/>
      </svg>
      <span>Anthropic</span>
    </div>
    <p class="footer-note">CLAUDE_DESIGN.md 디자인 시스템 데모 · 크림 + 코랄 + 다크 navy</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
