<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TALLY 240 · 계산기</title>
<meta name="description" content="종이 테이프에 기록을 인쇄하는 빈티지 회계 계산기" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Saira+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --desk:     #212A29;
    --enamel:   #0E4A43;
    --enamel-2: #0B3B35;
    --bevel:    #17635A;
    --shadow:   #08322D;
    --key:      #E9E2D0;
    --key-op:   #CDBE9E;
    --key-fn:   #B7C4BF;
    --tape:     #F6EFDD;
    --ink:      #211C16;
    --ink-soft: #6E6656;
    --ink-red:  #B23A2E;
    --amber:    #F2A20C;
    --screen:   #0A1512;
    --phosphor: #EDE3C9;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 4vw, 3rem);
    font-family: "Inter", system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(130% 110% at 50% -10%, #2C3735 0%, var(--desk) 52%, #141A19 100%);
  }

  .visually-hidden {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }

  /* ---------- Layout: the machine + the tape as one object ---------- */
  .station {
    display: flex;
    align-items: stretch;
    gap: 0;
    filter: drop-shadow(0 32px 44px rgba(0,0,0,.45));
  }

  /* ---------- Machine body (enamelled steel) ---------- */
  .machine {
    position: relative;
    width: min(370px, 92vw);
    padding: 1.15rem 1.15rem 1.35rem;
    background:
      linear-gradient(180deg, var(--bevel) 0%, var(--enamel) 8%, var(--enamel) 82%, var(--enamel-2) 100%);
    border-radius: 20px 8px 8px 20px;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,.14),
      inset 0 -3px 8px rgba(0,0,0,.4),
      inset 0 0 0 1px rgba(0,0,0,.25);
  }
  /* corner screws */
  .machine::before, .machine::after {
    content: ""; position: absolute; width: 9px; height: 9px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2c6a61, #06231f 75%);
    box-shadow: 0 1px 1px rgba(0,0,0,.5), inset 0 0 0 1px rgba(0,0,0,.4);
    top: 12px;
  }
  .machine::before { left: 12px; }
  .machine::after  { right: 12px; }

  .nameplate {
    display: flex;
    align-items: baseline;
    gap: .5ch;
    padding: .5rem .8rem;
    margin: .3rem .4rem 1rem;
    border-radius: 5px;
    background: linear-gradient(180deg, #0a352f, #0d453e);
    box-shadow: inset 0 1px 2px rgba(0,0,0,.55), inset 0 -1px 0 rgba(255,255,255,.06);
    font-family: "Saira Semi Condensed", sans-serif;
  }
  .brand {
    font-weight: 700; font-size: 1.1rem; letter-spacing: .16em;
    color: #CFE6DF;
    text-shadow: 0 1px 0 rgba(255,255,255,.10), 0 -1px 1px rgba(0,0,0,.5);
  }
  .plate-dot { color: var(--amber); font-weight: 700; }
  .model { font-weight: 600; font-size: 1.1rem; letter-spacing: .1em; color: #A9C6BE; }
  .plate-sub {
    margin-left: auto; align-self: center;
    font-size: .6rem; letter-spacing: .28em; text-transform: uppercase;
    color: #6f938a;
  }
  .led {
    width: 8px; height: 8px; border-radius: 50%; align-self: center;
    background: #5a3a06;
    transition: background .4s ease, box-shadow .4s ease;
  }
  body.booted .led {
    background: var(--amber);
    box-shadow: 0 0 6px 1px rgba(242,162,12,.75);
  }

  /* ---------- Display window (recessed screen) ---------- */
  .display {
    position: relative;
    margin: 0 .4rem 1.1rem;
    padding: .7rem 1rem;
    min-height: 74px;
    display: flex;
    align-items: center;
    gap: .6rem;
    background: linear-gradient(180deg, #06100d, var(--screen));
    border-radius: 7px;
    box-shadow:
      inset 0 3px 8px rgba(0,0,0,.75),
      inset 0 0 0 1px rgba(0,0,0,.6),
      0 1px 0 rgba(255,255,255,.05);
    overflow: hidden;
  }
  .op-flag {
    font-family: "JetBrains Mono", monospace;
    font-size: 1.5rem; font-weight: 700; line-height: 1;
    color: var(--amber);
    width: 1ch; text-align: center;
    opacity: .9;
  }
  .readout {
    flex: 1; min-width: 0;
    text-align: right;
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    font-size: clamp(1.7rem, 8vw, 2.5rem);
    letter-spacing: .01em;
    color: var(--phosphor);
    text-shadow: 0 0 7px rgba(237,227,201,.28);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  body.booting .readout { animation: flicker .5s steps(2) 1; }

  /* ---------- Keypad ---------- */
  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: .5rem;
    margin: 0 .3rem;
  }
  .key {
    appearance: none;
    border: 0;
    cursor: pointer;
    padding: .78rem 0;
    min-height: 54px;
    border-radius: 9px;
    font-family: "JetBrains Mono", monospace;
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--ink);
    background: linear-gradient(180deg, #fbf7ec 0%, var(--key) 55%, #d9cfb6 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.85),
      0 3px 0 #b3a888,
      0 5px 8px rgba(0,0,0,.3);
    transition: transform .05s ease, box-shadow .05s ease;
    user-select: none;
  }
  .key:hover { filter: brightness(1.02); }
  .key:active, .key.is-active {
    transform: translateY(3px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.6),
      0 0 0 #b3a888,
      0 1px 3px rgba(0,0,0,.35);
  }
  .key:focus-visible {
    outline: 3px solid var(--amber);
    outline-offset: 2px;
  }

  .key--fn {
    font-family: "Inter", sans-serif;
    font-size: .82rem;
    font-weight: 600;
    letter-spacing: .02em;
    min-height: 46px;
    color: #26302d;
    background: linear-gradient(180deg, #ccd6d1 0%, var(--key-fn) 60%, #96a8a2 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.6),
      0 3px 0 #7c8d87,
      0 5px 8px rgba(0,0,0,.3);
  }
  .key--fn:active, .key--fn.is-active {
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 0 0 #7c8d87, 0 1px 3px rgba(0,0,0,.35);
  }

  .key--op {
    font-size: 1.5rem;
    color: #3a2f18;
    background: linear-gradient(180deg, #efe6d0 0%, var(--key-op) 58%, #b3a481 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.7),
      0 3px 0 #9a8c69,
      0 5px 8px rgba(0,0,0,.3);
  }
  .key--op:active, .key--op.is-active {
    box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 0 0 #9a8c69, 0 1px 3px rgba(0,0,0,.35);
  }

  .key--zero { grid-column: span 2; text-align: center; }

  /* the amber total bar — the single bold moment */
  .key--equals {
    grid-column: 1 / -1;
    margin-top: .15rem;
    min-height: 50px;
    font-family: "Saira Semi Condensed", sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: .3em;
    text-indent: .3em;
    color: #3a2604;
    background: linear-gradient(180deg, #ffc23f 0%, var(--amber) 55%, #cf8404 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.6),
      0 3px 0 #a86a03,
      0 6px 12px rgba(207,132,4,.4);
  }
  .key--equals:active, .key--equals.is-active {
    transform: translateY(3px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 0 0 #a86a03, 0 1px 4px rgba(0,0,0,.4);
  }

  /* ---------- Paper tape ---------- */
  .tape-unit {
    position: relative;
    width: 232px;
    display: flex;
    flex-direction: column;
    margin-left: -6px;
    padding-top: 26px;
  }
  /* the metal feed slot where paper emerges */
  .tape-slot {
    position: absolute; top: 8px; left: 6px; right: 8px; height: 12px;
    border-radius: 3px;
    background: linear-gradient(180deg, #05201c, #0a332d);
    box-shadow: inset 0 2px 4px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.06);
    z-index: 3;
  }
  .tape-paper {
    position: relative;
    flex: 1;
    background: var(--tape);
    border-radius: 0 0 3px 3px;
    box-shadow: 0 0 0 1px rgba(0,0,0,.18), inset 4px 0 8px rgba(0,0,0,.06);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  /* perforated left edge */
  .tape-paper::before {
    content: ""; position: absolute; top: 0; bottom: 0; left: 0; width: 14px;
    background-image: radial-gradient(circle, var(--desk) 2.3px, transparent 2.8px);
    background-size: 12px 15px; background-position: 5px 6px;
    background-repeat: repeat-y;
    z-index: 2;
    opacity: .55;
  }
  .tape-scroll {
    flex: 1;
    overflow-y: auto;
    padding: .5rem .85rem .5rem 1.35rem;
    scrollbar-width: thin;
    scrollbar-color: #d3c9af transparent;
  }
  .tape-scroll::-webkit-scrollbar { width: 6px; }
  .tape-scroll::-webkit-scrollbar-thumb { background: #d3c9af; border-radius: 3px; }

  .tape-empty {
    margin-top: 1.4rem;
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: .72rem;
    letter-spacing: .04em;
    color: var(--ink-soft);
    opacity: .7;
  }

  .tape-lines { list-style: none; margin: 0; padding: 0; }

  .tape-line, .tape-total {
    display: flex; align-items: baseline; justify-content: flex-end;
    gap: .6ch;
    font-family: "JetBrains Mono", monospace;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    padding: .12rem 0;
  }
  .tape-line { font-size: .92rem; }
  .tl-num { text-align: right; }
  .tl-op { width: 1.2ch; text-align: center; color: var(--ink-soft); font-weight: 700; }
  .tape-line.is-red { color: var(--ink-red); }
  .tape-line.is-red .tl-op { color: var(--ink-red); }

  .tape-rule {
    list-style: none;
    height: 0; margin: .25rem 0 .15rem auto;
    width: 78%;
    border-top: 1.5px solid var(--ink);
    opacity: .8;
  }
  .tape-total {
    font-size: 1.05rem; font-weight: 700;
    padding-bottom: .35rem;
  }
  .tape-total.is-red { color: var(--ink-red); }
  .tl-tag {
    margin-right: auto;
    font-size: .7rem; font-weight: 700; letter-spacing: .1em;
    color: var(--ink-soft);
    align-self: center;
  }
  .tape-total.is-red .tl-tag { color: var(--ink-red); }

  .tape-note {
    list-style: none;
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: .8rem; letter-spacing: .04em;
    color: var(--ink-red);
    padding: .3rem 0;
  }

  .tape-cut {
    font-family: "JetBrains Mono", monospace;
    font-size: .8rem;
    color: var(--ink-soft);
    padding: .1rem .85rem .55rem 1.35rem;
    white-space: nowrap; overflow: hidden;
    opacity: .65;
  }

  /* print animation for freshly added tape lines */
  .print-in { animation: printIn .34s cubic-bezier(.2,.8,.2,1) 1; }
  .tape-total.print-in { animation: printIn .42s cubic-bezier(.2,.9,.2,1) 1; }

  @keyframes printIn {
    from { transform: translateY(10px); opacity: 0; filter: blur(.4px); }
    to   { transform: translateY(0);    opacity: 1; filter: blur(0); }
  }
  @keyframes flicker {
    0% { opacity: .2; } 50% { opacity: .85; } 100% { opacity: 1; }
  }

  /* ---------- Responsive: stack machine over tape ---------- */
  @media (max-width: 720px) {
    .station { flex-direction: column; align-items: center; }
    .machine { border-radius: 20px 20px 8px 8px; }
    .tape-unit {
      width: min(370px, 92vw);
      margin-left: 0; margin-top: -6px;
      padding-top: 24px;
      height: 240px;
    }
    .tape-paper { border-radius: 0 0 12px 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .key, .key--equals { transition: none; }
    .print-in, .tape-total.print-in { animation: none; }
    body.booting .readout { animation: none; }
    .station { filter: drop-shadow(0 20px 30px rgba(0,0,0,.4)); }
  }
</style>
</head>
<body class="booting">
  <h1 class="visually-hidden">TALLY 240 회계 계산기</h1>

  <div class="station">
    <!-- Machine -->
    <section class="machine" aria-label="계산기">
      <div class="nameplate">
        <span class="brand">TALLY</span>
        <span class="plate-dot">·</span>
        <span class="model">240</span>
        <span class="plate-sub">Adding&nbsp;Machine</span>
        <span class="led" aria-hidden="true"></span>
      </div>

      <div class="display">
        <span class="op-flag" id="opFlag" aria-hidden="true"></span>
        <output class="readout" id="readout" aria-live="polite" aria-label="계산 결과">0</output>
      </div>

      <div class="keys" id="keys" role="group" aria-label="키패드">
        <button class="key key--fn" data-action="clear"      data-key="Escape" aria-label="전체 지움">C</button>
        <button class="key key--fn" data-action="clearEntry"                  aria-label="입력 지움">CE</button>
        <button class="key key--fn" data-action="negate"                      aria-label="부호 바꿈">±</button>
        <button class="key key--fn" data-action="percent"     data-key="%"    aria-label="퍼센트">%</button>

        <button class="key key--num" data-action="digit" data-value="7">7</button>
        <button class="key key--num" data-action="digit" data-value="8">8</button>
        <button class="key key--num" data-action="digit" data-value="9">9</button>
        <button class="key key--op"  data-action="op" data-value="/" data-key="/" aria-label="나누기">÷</button>

        <button class="key key--num" data-action="digit" data-value="4">4</button>
        <button class="key key--num" data-action="digit" data-value="5">5</button>
        <button class="key key--num" data-action="digit" data-value="6">6</button>
        <button class="key key--op"  data-action="op" data-value="*" data-key="*" aria-label="곱하기">×</button>

        <button class="key key--num" data-action="digit" data-value="1">1</button>
        <button class="key key--num" data-action="digit" data-value="2">2</button>
        <button class="key key--num" data-action="digit" data-value="3">3</button>
        <button class="key key--op"  data-action="op" data-value="-" data-key="-" aria-label="빼기">−</button>

        <button class="key key--num key--zero" data-action="digit" data-value="0">0</button>
        <button class="key key--num" data-action="decimal" data-key="." aria-label="소수점">.</button>
        <button class="key key--op"  data-action="op" data-value="+" data-key="+" aria-label="더하기">+</button>

        <button class="key key--equals" data-action="equals" data-key="Enter" aria-label="총합 계산">= &nbsp;총합</button>
      </div>
    </section>

    <!-- Paper tape (the signature) -->
    <aside class="tape-unit" aria-label="계산 테이프">
      <div class="tape-slot" aria-hidden="true"></div>
      <div class="tape-paper">
        <div class="tape-scroll" id="tapeScroll">
          <p class="tape-empty" id="tapeEmpty">— 계산을 시작하세요 —</p>
          <ol class="tape-lines" id="tapeLines" role="log" aria-label="계산 기록" aria-live="polite"></ol>
        </div>
        <div class="tape-cut" aria-hidden="true">✂ ─ ─ ─ ─ ─ ─ ─ ─ ─</div>
      </div>
    </aside>
  </div>

<script>
(function () {
  "use strict";

  var readoutEl = document.getElementById("readout");
  var opFlagEl  = document.getElementById("opFlag");
  var keysEl    = document.getElementById("keys");
  var linesEl   = document.getElementById("tapeLines");
  var scrollEl  = document.getElementById("tapeScroll");
  var emptyEl   = document.getElementById("tapeEmpty");

  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var GLYPH = { "+": "+", "-": "−", "*": "×", "/": "÷" };

  // --- calculator state ---
  var acc = null;            // accumulator
  var pendingOp = null;      // "+","-","*","/" or null
  var entry = "0";           // string currently shown / typed
  var overwrite = false;     // next digit starts a new number
  var justEvaluated = false; // last action was "="
  var errored = false;

  // --- number helpers ---
  function trimNum(n) {
    if (!isFinite(n)) return "ERROR";
    var r = Math.round(n * 1e8) / 1e8;
    if (Object.is(r, -0)) r = 0;
    return r.toString();
  }

  function group(str) {
    if (str === "ERROR" || str.indexOf("e") >= 0) return str;
    var neg = str.charAt(0) === "-";
    var s = neg ? str.slice(1) : str;
    var dot = s.indexOf(".");
    var intp = dot >= 0 ? s.slice(0, dot) : s;
    var frac = dot >= 0 ? s.slice(dot) : "";
    intp = intp.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    return (neg ? "-" : "") + (intp === "" ? "0" : intp) + frac;
  }

  function fmt(n) { return group(trimNum(n)); }

  function apply(a, op, b) {
    switch (op) {
      case "+": return a + b;
      case "-": return a - b;
      case "*": return a * b;
      case "/": return b === 0 ? Infinity : a / b;
    }
    return b;
  }

  // --- display ---
  function render() {
    readoutEl.textContent = errored ? "ERROR" : group(entry);
    opFlagEl.textContent = pendingOp ? GLYPH[pendingOp] : "";
  }

  function resetAll() {
    acc = null; pendingOp = null; entry = "0";
    overwrite = false; justEvaluated = false; errored = false;
    render();
  }

  // --- tape ---
  function appendTape(node) {
    emptyEl.hidden = true;
    if (!reduceMotion) node.classList.add("print-in");
    linesEl.appendChild(node);
    scrollEl.scrollTop = scrollEl.scrollHeight;
  }

  function printLine(value, op) {
    var red = op === "-" || value < 0;
    var li = document.createElement("li");
    li.className = "tape-line" + (red ? " is-red" : "");
    li.innerHTML =
      '<span class="tl-num">' + fmt(value) + '</span>' +
      '<span class="tl-op">' + GLYPH[op] + '</span>';
    appendTape(li);
  }

  function printTotal(value) {
    var rule = document.createElement("li");
    rule.className = "tape-rule";
    rule.setAttribute("aria-hidden", "true");
    linesEl.appendChild(rule);

    var li = document.createElement("li");
    li.className = "tape-total" + (value < 0 ? " is-red" : "");
    li.innerHTML =
      '<span class="tl-tag">T</span>' +
      '<span class="tl-num">' + fmt(value) + '</span>';
    appendTape(li);
  }

  function printError() {
    var li = document.createElement("li");
    li.className = "tape-note";
    li.textContent = "— 0으로 나눌 수 없음 —";
    appendTape(li);
  }

  function doError() {
    errored = true; acc = null; pendingOp = null;
    overwrite = true; justEvaluated = false;
    printError();
    render();
  }

  // --- actions ---
  function inputDigit(d) {
    if (errored || justEvaluated) resetAll();
    if (overwrite) { entry = d; overwrite = false; }
    else if (entry === "0") { entry = d; }
    else { if (entry.replace(/[-.]/g, "").length >= 14) return; entry += d; }
    render();
  }

  function inputDecimal() {
    if (errored || justEvaluated) resetAll();
    if (overwrite) { entry = "0."; overwrite = false; }
    else if (entry.indexOf(".") < 0) { entry += "."; }
    render();
  }

  function inputOp(op) {
    if (errored) return;
    justEvaluated = false;
    if (pendingOp !== null && !overwrite) {
      var rhs = Number(entry);
      var res = apply(acc, pendingOp, rhs);
      if (!isFinite(res)) { doError(); return; }
      printLine(rhs, pendingOp);
      acc = res;
    } else if (acc === null) {
      acc = Number(entry);
      printLine(Number(entry), op);
    }
    pendingOp = op;
    overwrite = true;
    entry = trimNum(acc);
    render();
  }

  function equals() {
    if (errored) return;
    if (pendingOp !== null && !overwrite) {
      var rhs = Number(entry);
      var res = apply(acc, pendingOp, rhs);
      if (!isFinite(res)) { doError(); return; }
      printLine(rhs, pendingOp);
      acc = res;
      printTotal(acc);
      entry = trimNum(acc);
    } else if (acc !== null && !justEvaluated) {
      printTotal(acc);
      entry = trimNum(acc);
    }
    pendingOp = null;
    overwrite = true;
    justEvaluated = true;
    render();
  }

  function negate() {
    if (errored) return;
    if (entry !== "0") {
      entry = entry.charAt(0) === "-" ? entry.slice(1) : "-" + entry;
    }
    overwrite = false; justEvaluated = false;
    render();
  }

  function percent() {
    if (errored) return;
    var v = Number(entry) / 100;
    if (pendingOp !== null && acc !== null) v = acc * (Number(entry) / 100);
    entry = trimNum(v);
    overwrite = false; justEvaluated = false;
    render();
  }

  function backspace() {
    if (errored) { resetAll(); return; }
    if (overwrite || justEvaluated) return;
    entry = entry.length > 1 ? entry.slice(0, -1) : "0";
    if (entry === "-" || entry === "") entry = "0";
    render();
  }

  function runAction(action, value) {
    switch (action) {
      case "digit":      inputDigit(value); break;
      case "decimal":    inputDecimal(); break;
      case "op":         inputOp(value); break;
      case "equals":     equals(); break;
      case "clear":      resetAll(); break;
      case "clearEntry": entry = "0"; overwrite = false; errored = false; render(); break;
      case "negate":     negate(); break;
      case "percent":    percent(); break;
    }
  }

  // --- input wiring ---
  keysEl.addEventListener("click", function (e) {
    var btn = e.target.closest(".key");
    if (!btn) return;
    runAction(btn.dataset.action, btn.dataset.value);
  });

  function flash(selector) {
    var btn = keysEl.querySelector(selector);
    if (!btn) return;
    btn.classList.add("is-active");
    setTimeout(function () { btn.classList.remove("is-active"); }, 110);
  }

  document.addEventListener("keydown", function (e) {
    var k = e.key;
    if (k >= "0" && k <= "9") {
      inputDigit(k); flash('[data-action="digit"][data-value="' + k + '"]');
    } else if (k === ".") {
      inputDecimal(); flash('[data-action="decimal"]');
    } else if (k === "+" || k === "-" || k === "*" || k === "/") {
      inputOp(k); flash('[data-value="' + (k === "*" ? "\\*" : k) + '"][data-action="op"]');
    } else if (k === "Enter" || k === "=") {
      e.preventDefault(); equals(); flash('[data-action="equals"]');
    } else if (k === "Backspace") {
      backspace();
    } else if (k === "Escape") {
      resetAll(); flash('[data-action="clear"]');
    } else if (k === "%") {
      percent(); flash('[data-action="percent"]');
    }
  });

  // --- power-on ---
  window.addEventListener("load", function () {
    setTimeout(function () {
      document.body.classList.remove("booting");
      document.body.classList.add("booted");
    }, reduceMotion ? 0 : 520);
  });

  render();
})();
</script>
</body>
</html>
