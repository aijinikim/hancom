<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계산기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="display__previous" id="previous"></div>
      <div class="display__current" id="current">0</div>
    </div>
    <div class="buttons" id="buttons">
      <button class="btn btn--action" data-action="clear">C</button>
      <button class="btn btn--action" data-action="delete">⌫</button>
      <button class="btn btn--action" data-action="percent">%</button>
      <button class="btn btn--operator" data-operator="÷">÷</button>

      <button class="btn" data-digit="7">7</button>
      <button class="btn" data-digit="8">8</button>
      <button class="btn" data-digit="9">9</button>
      <button class="btn btn--operator" data-operator="×">×</button>

      <button class="btn" data-digit="4">4</button>
      <button class="btn" data-digit="5">5</button>
      <button class="btn" data-digit="6">6</button>
      <button class="btn btn--operator" data-operator="−">−</button>

      <button class="btn" data-digit="1">1</button>
      <button class="btn" data-digit="2">2</button>
      <button class="btn" data-digit="3">3</button>
      <button class="btn btn--operator" data-operator="+">+</button>

      <button class="btn btn--action" data-action="sign">±</button>
      <button class="btn" data-digit="0">0</button>
      <button class="btn" data-action="decimal">.</button>
      <button class="btn btn--equals" data-action="equals">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
