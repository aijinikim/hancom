<!-- HTML 선언-->
<!DOCTYPE html>
<!-- HTMl 시작 및 한글 설정-->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸-->
    <head>
        <!-- 한글 깨지지 않도록-->
        <meta>
        <!-- 브라우저 탭 이름-->
        <title>
            글자 꾸미기
        </title>
    </head>
    <!-- 화면에 보이는 칸-->
    <body>
        <h1>글자 꾸미기</h1>
        <p><em>기울임 강조</em></p>
        <p><mark>형광펜 입니다.</mark></p>
        <p><small>작게 쓰는 글씨</small></p>
        <blockquote>남의 말을 인용합니다.</blockquote>
        <p>H<sub>2</sub>O</p>
        <p>X<sup>2</sup></p>
    </body>
</html>
