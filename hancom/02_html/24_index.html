<!-- HTMl 선언-->
<!DOCTYPE html>
<!-- HTML 문서 시작 및 한국어 설정-->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸-->
    <head>
        <!-- 한글 깨지지 않도록-->
        <meta>
        <!-- 브라우저 탭 이름-->
        <title>
            입력 Type
        </title>
    </head>
    <!-- 화면에 보이는 칸-->
    <body>
        <h1>입력 Type</h1>
        <form>
            <label>이메일 : <input type="email", placeholder="메일"></label>
            <br>
            <label>비밀번호 : <input type="password"></label>
            <br>
            <label>동의<input type="checkbox"></label>
            <br>
            <label>성별<input type="radio" name="gender">남</label>
            <label><input type="radio" name="gender">여</label>
            <label><input type="radio" name="gender">모름</label>
            <br>
            <input type="date">
            <br>
            <textarea>
                안녕하세요!
            </textarea>
            <br>
            <select>
                <option>서울</option>
                <option>부산</option>
                <option>제주도</option>
            </select>
        </form>
    </body>
</html>
