<!-- HTML 선언-->
<!DOCTYPE html>
<!-- HTML 시작 및 한글 설정-->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸-->
    <head>
        <!-- 한글 깨지지 않도록-->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름-->
        <title>
            표 합치기
        </title>
    </head>
    <!-- 화면에 보이는 칸-->
    <body>
        <h1>표 합치기</h1>
        <table border="1">
            <thead>
                <tr>
                    <th colspan="4"> <!--가로 3칸을 하나로 합침-->
                        성적표
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr><td rowspan="5">과목</td><td>영어</td><td>90</td></tr>
                <tr><td>수학</td><td>85</td></tr>
                <tr><td>국어</td><td>95</td></tr>
                <tr><td>사회</td><td>95</td></tr>
                <tr><td>공학</td><td>95</td></tr>
            </tbody>
        </table>
    </body>
</html>
