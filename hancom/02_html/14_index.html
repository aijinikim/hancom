<!-- HTML 문서 선언-->
<!DOCTYPE html>
<!-- HTML 시작, 한국어 페이지-->
<html lang="ko">
    <!-- 문서에 보이지 않는 칸-->
    <head>
        <!-- 빈 요소, 한국어 깨지지 않도록-->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름-->
        <title>
            표 만들기
        </title>
    </head>
    <!-- 화면에 보이는 칸-->
    <body>
        <table border="1">
            <caption>시간표</caption>
            <!-- tr : 가로 한줄, th : 제목 칸-->
            <tr><th>요일</th><th>내용</th><th>시간</th></tr>
            <!-- td : 보통 내용 칸-->
            <tr><td>월</td><td>HTML</td><td>7h</td></tr>
            <tr><td>화</td><td>HTML</td><td>7h</td></tr>
        </table>
    </body>
</html>
