<!-- 이건 HTML 문서야-->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 페이지-->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸-->
    <head>
        <!-- 한국어 깨지지 않게-->
        <meta charset="UTF-8">
        <!-- 브라우저 탭 이름-->
        <title>
            번호 목록
        </title>
    </head>
    <!-- 화면에 보이는 칸-->
    <body>
        <!-- 번호가 자동으로 붙는 목록(순서 중요할때)-->
        <ol>
            <li>먹는것</li>
            <li>자는것</li>
            <li>걷는것</li>
            <ol>
                <li>안녕</li>
                <li>잘가</li>
                <ol type="i">
                    <li>Hello</li>
                    <li>Bye</li>
                </ol>
            </ol>
        </ol>
    </body>
</html>
